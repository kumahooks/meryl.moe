name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -trimpath -o server ./cmd/server/main.go

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << 'EOF'
          Host vps
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            Port ${{ secrets.SSH_PORT }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking yes
          EOF

      - name: Upload artifacts
        run: |
          scp server vps:/opt/meryl.moe/server.new
          rsync -az --delete static/ vps:/opt/meryl.moe/static/

      - name: Swap and restart
        run: ssh vps "mv /opt/meryl.moe/server.new /opt/meryl.moe/server && sudo systemctl restart merylmoe"
