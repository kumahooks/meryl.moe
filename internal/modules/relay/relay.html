{{define "page-content"}}
<title>{{.Title}}</title>
<link rel="stylesheet" href="/static/modules/relay/relay.css">

{{template "navbar" .}}

<div class="relay-container">
	<textarea id="relay-input" class="relay-textarea" placeholder="type to encode..." spellcheck="false" autocomplete="off"></textarea>

	<div class="relay-statusline">

	<div class="relay-modeline">

	</div>
</div>

<script src="/static/modules/relay/relay.js"></script>
{{end}}
