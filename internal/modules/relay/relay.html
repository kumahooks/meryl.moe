{{define "page-content"}}
<title>{{.Title}}</title>
<link rel="stylesheet" href="/static/modules/relay/relay.css">

{{template "navbar" .}}

<div class="relay-container">
	<div class="relay-editor">
		<div class="relay-gutter" id="relay-gutter"></div>
		<textarea id="relay-input" class="relay-textarea" placeholder="type something to share..." spellcheck="false" autocomplete="off"></textarea>
	</div>

	<div class="relay-modeline">
		<span class="relay-stat">chars: <span id="relay-charcount">0</span></span>
	</div>
</div>

<script type="module" src="/static/modules/relay/relay.js"></script>
{{end}}
