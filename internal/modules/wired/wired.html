{{define "page-head"}}
<link rel="stylesheet" href="/static/modules/wired/wired.css">
{{end}}

{{define "page-content"}}
<title>{{.Title}}</title>
<link rel="stylesheet" href="/static/modules/wired/wired.css">

<div class="wired-container">
	<div class="wired-card">
		<div class="wired-header">
			<p class="wired-title">wired<span class="wired-title-slash">/</span></p>
			<a class="wired-back" href="/">$ cd ..</a>
		</div>

		<form class="wired-form" method="POST" action="/wired" hx-boost="false">
			<input class="wired-input" type="text" name="username" placeholder="username" autocomplete="username" autofocus>
			<input class="wired-input" type="password" name="password" placeholder="password" autocomplete="current-password">

			{{if .Error}}
			<p class="wired-error">{{.Error}}</p>
			{{end}}

			<button class="wired-submit" type="submit">enter</button>
		</form>
	</div>
</div>

<script type="module" src="/static/platform/notifications.js"></script>
{{end}}
